<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title></title>
  <style>html,body{height:100%;margin:0;background:#fff;}</style>
  <script>
    (function(){
      // Replace the URL below with your GCP file URL
      var target = "https://storage.googleapis.com/BUCKET/FILE";
      // Delay in milliseconds (sub-second redirect)
      var delay = 100;
      setTimeout(function(){ window.location.replace(target); }, delay);
    })();
  </script>
</head>
<body></body>
</html>
